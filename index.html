<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sample Git Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
      <div class="glass-container">
          <header>
              <h1 id="main-title">Git Mastery</h1>
              <p class="subtitle">Demonstrating Version Control & Collaboration</p>
          </header>

          <main>
              <div class="card" id="status-card">
                  <h2>Project Status</h2>
                  <p id="msg">Local repository initialized and ready.</p>
                  <button id="action-btn">Check Progress</button>
              </div>

              <section class="git-steps">
                  <div class="step-badge">Phase 1</div>
                  <ul>
                      <li>Initialize local repository</li>
                    <li>Stage and commit changes</li>
                    <li>Connect to GitHub</li>
                </ul>
              </section>
          </main>

          <footer>
              <p>&copy; 2026 Git Sample Task 19</p>
          </footer>
      </div>
      <script src="script.js"></script>
  </body>
  </html>
